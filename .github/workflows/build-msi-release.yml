- name: Build Windows desktop app
  run: |
    mkdir -p build
    # 必须开启 CGO (fyne 桌面端强制需要)
    $env:CGO_ENABLED = "1"
    # 安装 fyne 工具（自动处理依赖）
    go install fyne.io/fyne/v2/cmd/fyne@latest
    # 使用 fyne 打包命令编译（自动解决 OpenGL/GLFW 依赖）
    fyne package -os windows -src ./cmd/desktop -o build/KrillinAI.exe -version 1.0.3
  shell: pwsh
