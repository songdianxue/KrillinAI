name: Build MSI and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-msi:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.21
      
      - name: Extract version from tag
        id: version
        run: |
          $version = "${{ github.ref }}" -replace "refs/tags/v", ""
          echo "version=$version" | Out-String | Add-Content -Path $env:GITHUB_OUTPUT
      
      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y
          refreshenv
      
      - name: Build Windows binary
        run: |
          mkdir -p build
          $env:CGO_ENABLED = "0"
          go build -v -o build/KrillinAI.exe -ldflags "-X main.Version=${{ steps.version.outputs.version }}" ./cmd/desktop
      
      - name: Build MSI installer
        run: |
          cd installer
          heat.exe dir ../build -o files.wxs -scom -frag -gg -srd -dr INSTALLFOLDER
          candle.exe -o KrillinAI.wixobj KrillinAI.wxs files.wxs
          light.exe -out KrillinAI-${{ steps.version.outputs.version }}.msi KrillinAI.wixobj
          move KrillinAI-${{ steps.version.outputs.version }}.msi ../build/
      
      - name: Create Release
        uses: actions/create-release@v1
        id: create_release
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload MSI to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/KrillinAI-${{ steps.version.outputs.version }}.msi
          asset_name: KrillinAI-${{ steps.version.outputs.version }}.msi
          asset_content_type: application/x-msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
