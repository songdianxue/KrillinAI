name: Build and Release Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-and-release:
    name: Build NSIS Installer and Release
    runs-on: windows-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2. 设置 Go 环境
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      
      # 3. 获取版本号
      - name: Get version
        id: get_version
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) {
            $ref = "${{ github.ref }}"
            if ($ref -match "refs/tags/v(.+)") {
              $version = $matches[1]
            } else {
              $version = "1.0.0"
            }
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "✓ Version: $version"
        shell: powershell
      
      # 4. 创建构建目录
      - name: Create build directories
        run: |
          mkdir -Force dist
          mkdir -Force build
          Write-Host "✓ Build directories created"
        shell: powershell
      
      # 5. 编译 Go 应用
      - name: Build Go executable
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          Write-Host "Building KrillinAI v$version..."
          
          go build -ldflags="-X main.Version=$version" `
                   -o dist/KrillinAI.exe `
                   ./cmd/server/main.go
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "✗ Go build failed"
            exit 1
          }
          Write-Host "✓ Go executable built: $(Get-Item dist/KrillinAI.exe | % {$_.Length / 1MB} | % {"$_.2 MB"})"
        shell: powershell
      
      # 6. 安装 NSIS
      - name: Install NSIS
        run: |
          Write-Host "Installing NSIS..."
          choco install nsis -y
          makensis.exe /version
          Write-Host "✓ NSIS installed"
        shell: powershell
      
      # 7. 构建 NSIS 安装程序
      - name: Build NSIS installer
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          Write-Host "Building NSIS installer..."
          
          makensis.exe /DPRODUCT_VERSION=$version `
                       installer/krillinai.nsi
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "✗ NSIS build failed"
            exit 1
          }
          
          $installer = Get-Item dist/*.exe | Select-Object -First 1
          Write-Host "✓ Installer built: $($installer.Name) ($('{0:F2}' -f ($installer.Length / 1MB)) MB)"
        shell: powershell
      
      # 8. 计算 SHA256
      - name: Calculate SHA256
        id: checksum
        run: |
          $file = Get-Item dist/*.exe | Select-Object -First 1
          $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash
          
          echo "INSTALLER_FILE=$($file.Name)" >> $env:GITHUB_OUTPUT
          echo "INSTALLER_HASH=$hash" >> $env:GITHUB_OUTPUT
          
          Write-Host "✓ File: $($file.Name)"
          Write-Host "✓ SHA256: $hash"
        shell: powershell
      
      # 9. 创建发布说明
      - name: Create release notes
        id: release_notes
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $file = "${{ steps.checksum.outputs.INSTALLER_FILE }}"
          $hash = "${{ steps.checksum.outputs.INSTALLER_HASH }}"
          
          $body = @"
# KrillinAI v$version - Windows 安装程序

## 📥 下载

**文件**: \`$file\`

**SHA256 校验码**:
\`\`\`
$hash
\`\`\`

## 📋 安装步骤

1. 下载上面的 \`.exe\` 安装程序
2. 双击运行安装程序
3. 按照向导完成安装
4. 打开"开始菜单" → 找到 KrillinAI 并运行

## ✨ 系统要求

- Windows 7 或更高版本
- 最少 100MB 磁盘空间

## 🔒 验证文件完整性

打开 PowerShell 并运行:
\`\`\`powershell
(Get-FileHash -Path "$file" -Algorithm SHA256).Hash
\`\`\`

验证结果应与上面的 SHA256 校验码一致

## 📖 使用说明

安装后，可以从开始菜单启动 KrillinAI，或者：
- 桌面快捷方式启动
- 命令行运行：\`KrillinAI.exe\`

## 🐛 遇到问题？

- [提交 Issue](https://github.com/songdianxue/KrillinAI/issues)
- 检查 [常见问题](https://github.com/songdianxue/KrillinAI/wiki)

---

**编译时间**: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC') ⏰
"@
          
          $body | Out-File -FilePath release_notes.md -Encoding UTF8
          cat release_notes.md
        shell: powershell
      
      # 10. 发布到 GitHub Releases
      - name: Publish to Releases
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.exe
          body_path: release_notes.md
          draft: false
          prerelease: false
          tag_name: ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 11. 上传构建产物
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: KrillinAI-v${{ steps.get_version.outputs.VERSION }}
          path: dist/*.exe
          retention-days: 30
      
      # 12. 发送构建完成通知
      - name: Build completed
        if: success()
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "✓ 构建成功！" -ForegroundColor Green
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "版本: v${{ steps.get_version.outputs.VERSION }}" -ForegroundColor Yellow
          Write-Host "文件: ${{ steps.checksum.outputs.INSTALLER_FILE }}" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "📥 下载链接:" -ForegroundColor Cyan
          Write-Host "https://github.com/songdianxue/KrillinAI/releases/tag/v${{ steps.get_version.outputs.VERSION }}" -ForegroundColor Green
        shell: powershell
      
      - name: Build failed
        if: failure()
        run: |
          Write-Host "========================================" -ForegroundColor Red
          Write-Host "✗ 构建失败" -ForegroundColor Red
          Write-Host "========================================" -ForegroundColor Red
          Write-Host "请检查上面的错误日志" -ForegroundColor Yellow
        shell: powershell
